<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KPI Report</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f1f5f9; margin: 0; }
        #dashboard-container { display: none; padding: 24px; max-width: 1400px; margin: 0 auto; }
        
        /* Стили карточек KPI */
        .kpi-card { background: #1e293b; border-radius: 16px; border: 1px solid #334155; overflow: hidden; display: flex; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.2); }
        .side-label { background: #6366f1; color: white; writing-mode: vertical-lr; transform: rotate(180deg); text-align: center; font-weight: 800; padding: 15px; letter-spacing: 0.1em; text-transform: uppercase; }
        
        .grid-row { display: grid; grid-template-columns: 180px 1fr 1fr 1fr 1fr; gap: 12px; align-items: center; padding: 8px 0; border-bottom: 1px solid #334155; }
        .grid-row:last-child { border-bottom: none; }
        
        .val-box { border: 2px solid #6366f1; border-radius: 8px; padding: 8px 12px; display: flex; justify-content: space-between; align-items: center; font-weight: 700; background: #0f172a; min-height: 44px; }
        .target-box { background: #312e81; border: 2px solid #818cf8; color: #e0e7ff; text-align: center; font-weight: 800; border-radius: 8px; padding: 8px; }
        
        .arrow-up { color: #22c55e; font-size: 1.1rem; }
        .arrow-down { color: #ef4444; font-size: 1.1rem; }
        .stable { color: #94a3b8; }

        .tab-btn { padding: 12px 24px; font-weight: 600; color: #94a3b8; border-bottom: 3px solid transparent; transition: 0.3s; }
        .tab-btn.active { color: #6366f1; border-bottom-color: #6366f1; background: rgba(99, 102, 241, 0.05); }
        
        .fade-in { animation: fadeIn 0.5s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<header class="flex items-center justify-between px-8 py-4 bg-[#0f172a] border-b border-slate-700 shadow-lg">
    <div class="flex items-center gap-3">
        <img src="NoAca_logo_Symbolwhite.png" alt="Logo" class="h-16 w-auto object-contain">
        <div class="flex flex-col">
            <span class="text-xl font-bold text-white leading-none">Gueslectors</span>
            <span class="text-[10px] font-medium uppercase tracking-[0.2em] text-slate-400 mt-1">KPI Monthly Report</span>
        </div>
    </div>
</header>

<main>
    <div id="login-section" class="flex flex-col items-center justify-center h-[75vh] px-4">
        <h1 class="text-3xl font-bold mb-8 text-white text-center">Authorization is possible only with a Novikontas email address.</h1>
        <button id="login-btn" onclick="handleAuthClick()" class="bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-4 px-12 rounded-xl transition-all shadow-xl shadow-indigo-500/25 active:scale-95 flex items-center gap-3">
            <img src="https://www.google.com/favicon.ico" width="20" alt="G"> Log in with Google
        </button>
    </div>

    <div id="dashboard-container" class="fade-in space-y-10">
        
        <div class="flex justify-between items-center border-b border-slate-700 px-4">
            <div class="flex gap-4">
                <button id="tab-std-btn" class="tab-btn active" onclick="switchTab('standard')">Department Statistics</button>
                <button id="tab-det-btn" class="tab-btn" onclick="switchTab('detailed')">Detailed Statistics</button>
            </div>
            <button onclick="loadAllData()" class="text-xs bg-slate-800 hover:bg-slate-700 text-indigo-400 py-1.5 px-4 rounded-lg border border-slate-600 transition-all flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/></svg>
                Refresh Data
            </button>
        </div>

        <h1 class="text-4xl font-black text-indigo-400 border-l-8 border-indigo-600 pl-6 uppercase tracking-tighter italic">
            Navigational Department
        </h1>

        <div id="kpi-content-area" class="space-y-12 pb-20">
            </div>

    </div>
</main>

<script>
    const CLIENT_ID = '962018048971-1362jqjncldrmln6rm01g88v1jj45go9.apps.googleusercontent.com';
    const SPREADSHEET_ID = '1eqKkNYd4k9CSlRw8tOCtgzxDooVZgD0z8vjupFgO8iI';
    
    let tokenClient, accessToken = null;
    let activeTab = 'standard'; 
    let kpiData = [];

    function initClient() {
        tokenClient = google.accounts.oauth2.initTokenClient({
            client_id: CLIENT_ID,
            scope: 'https://www.googleapis.com/auth/spreadsheets.readonly',
            callback: async (resp) => { if (resp.access_token) { accessToken = resp.access_token; await loadAllData(); } },
        });
    }

    function handleAuthClick() { tokenClient ? tokenClient.requestAccessToken() : alert("Loading API..."); }

    async function loadAllData() {
        document.getElementById('login-section').style.display = 'none';
        document.getElementById('dashboard-container').style.display = 'block';
        
        try {
            // Читаем Лист5, где лежат данные для этой таблицы (A1:J20)
            const resp = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}/values/NAV TC!A1:J20`, { 
                headers: { 'Authorization': `Bearer ${accessToken}` } 
            });
            const result = await resp.json();
            kpiData = result.values || [];
            
            renderDashboard();
        } catch (err) { console.error(err); }
    }

    function switchTab(tab) {
        activeTab = tab;
        document.getElementById('tab-std-btn').className = `tab-btn ${tab === 'standard' ? 'active' : ''}`;
        document.getElementById('tab-det-btn').className = `tab-btn ${tab === 'detailed' ? 'active' : ''}`;
        renderDashboard();
    }

    function renderDashboard() {
        const container = document.getElementById('kpi-content-area');
        container.innerHTML = '';

        // Группируем данные (например, все что относится к NAV TC и GMDSS TC)
        // В этом примере просто берем первые 4 строки для первой карточки
        const groups = [
            { name: "NAV TC", rows: kpiData.slice(1, 5) },
            { name: "GMDSS TC", rows: kpiData.slice(5, 9) }
        ];

        groups.forEach(group => {
            if (group.rows.length === 0 || !group.rows[0][0]) return;
            
            let cardHtml = `
                <div class="kpi-card">
                    <div class="side-label">${group.name}</div>
                    <div class="flex-1 p-8">
                        <div class="grid-row border-none text-[10px] uppercase font-bold text-slate-500 text-center mb-2">
                            <div></div>
                            <div>2024 Year<br><span class="text-indigo-400">January</span></div>
                            <div>2025 Year<br><span class="text-indigo-400">January</span></div>
                            <div>Previous Month</div>
                            <div class="text-indigo-200">2026 Year<br>January</div>
                        </div>
                        ${group.rows.map(row => renderKpiRow(row)).join('')}
                    </div>
                </div>
            `;
            container.innerHTML += cardHtml;
        });
    }

    function renderKpiRow(row) {
        const icons = { "Income": "💰", "Expenses": "💳", "Profit": "📈", "Participants": "👥" };
        const category = row[0].split(' - ')[1] || row[0];
        const icon = icons[category] || "•";

        return `
            <div class="grid-row">
                <div class="font-bold flex items-center gap-2 text-slate-300">
                    <span class="text-lg">${icon}</span> ${category}
                </div>
                ${createValBox(row[1], row[2])}
                ${createValBox(row[3], row[4])}
                ${createValBox(row[5], row[6])}
                <div class="target-box">${row[9] || '-'}</div>
            </div>
        `;
    }

    function createValBox(val, trend) {
        if (!val) return `<div></div>`;
        let arrow = '';
        if (trend === 'UP') arrow = '<span class="arrow-up">▲</span>';
        else if (trend === 'DOWN') arrow = '<span class="arrow-down">▼</span>';
        else arrow = '<span class="stable">=</span>';
        
        return `<div class="val-box">${val} ${arrow}</div>`;
    }
</script>
<script src="https://accounts.google.com/gsi/client" onload="initClient()" async defer></script>
</body>
</html>
