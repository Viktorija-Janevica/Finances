<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gueslectors | KPI Reporting System</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f1f5f9; margin: 0; }
        #dashboard-container { display: none; padding: 24px; max-width: 1400px; margin: 0 auto; }
        
        @media print {
            body { background: white !important; color: black !important; }
            header, .no-print { display: none !important; }
            .main-dept-group { page-break-before: always; }
            .kpi-card { break-inside: avoid; border: 1px solid #e2e8f0 !important; background: white !important; color: black !important; box-shadow: none !important; margin-bottom: 20px !important; }
            .side-label { background: #1e293b !important; color: white !important; border-right: 1px solid #ddd; min-width: 65px !important; }
            .val-box { border: 1px solid #94a3b8 !important; background: #f8fafc !important; color: black !important; }
            .target-box { background: #f1f5f9 !important; border: 1px solid #1e293b !important; color: black !important; }
            .text-indigo-400 { color: #1e293b !important; }
            #dashboard-container { display: block !important; padding: 0; max-width: 100%; }
        }

        .kpi-card { background: #1e293b; border-radius: 16px; border: 1px solid #334155; overflow: hidden; display: flex; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.2); }
        .side-label { background: #6366f1; color: white; writing-mode: vertical-lr; transform: rotate(180deg); text-align: center; font-weight: 800; padding: 15px; letter-spacing: 0.1em; text-transform: uppercase; min-width: 55px; }
        
        .grid-row { display: grid; grid-template-columns: 200px 1fr 1fr 1fr 1fr 1fr; gap: 12px; align-items: center; padding: 10px 0; border-bottom: 1px solid #334155; }
        .grid-row:last-child { border-bottom: none; }
        
        .val-box { border: 2px solid #6366f1; border-radius: 8px; padding: 8px 12px; display: flex; justify-content: space-between; align-items: center; font-weight: 700; background: #0f172a; min-height: 44px; }
        .target-box { background: #312e81; border: 2px solid #818cf8; color: #e0e7ff; text-align: center; font-weight: 800; border-radius: 8px; padding: 8px; }
        
        .arrow-up { color: #22c55e; font-size: 1.1rem; }
        .arrow-down { color: #ef4444; font-size: 1.1rem; }
        .stable { color: #94a3b8; }

        select { background: #1e293b; color: white; border: 1px solid #475569; padding: 8px 12px; border-radius: 8px; cursor: pointer; font-weight: 600; outline: none; }
    </style>

    <script>
        const CLIENT_ID = '962018048971-1362jqjncldrmln6rm01g88v1jj45go9.apps.googleusercontent.com';
        const SPREADSHEET_ID = '1eqKkNYd4k9CSlRw8tOCtgzxDooVZgD0z8vjupFgO8iI';
        
        let tokenClient, accessToken = null;
        let fullDataRows = []; // Храним загруженные данные для фильтрации

        function initClient() {
            tokenClient = google.accounts.oauth2.initTokenClient({
                client_id: CLIENT_ID,
                scope: 'https://www.googleapis.com/auth/spreadsheets.readonly',
                callback: async (resp) => { 
                    if (resp.access_token) { 
                        accessToken = resp.access_token; 
                        await fetchSheetNames(); 
                    } 
                },
            });
        }

        function handleAuthClick() { 
            if (tokenClient) {
                tokenClient.requestAccessToken(); 
            } else {
                alert("Система загружается, попробуйте снова через секунду.");
            }
        }

        async function fetchSheetNames() {
            try {
                const resp = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}?fields=sheets.properties.title`, {
                    headers: { 'Authorization': `Bearer ${accessToken}` }
                });
                const data = await resp.json();
                
                const sourceResp = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}/values/source!A1`, {
                    headers: { 'Authorization': `Bearer ${accessToken}` }
                });
                const sourceData = await sourceResp.json();
                const defaultMonth = sourceData.values ? sourceData.values[0][0].trim() : null;

                const selector = document.getElementById('month-selector');
                selector.innerHTML = '';

                data.sheets.forEach((sheet) => {
                    const name = sheet.properties.title;
                    if (name.toLowerCase() === 'source') return;

                    const option = document.createElement('option');
                    option.value = name;
                    option.text = name;
                    if (defaultMonth && name === defaultMonth) option.selected = true;
                    selector.appendChild(option);
                });

                if (selector.selectedIndex === -1 && selector.options.length > 0) {
                    selector.options[selector.options.length - 1].selected = true;
                }

                await loadAllData();
            } catch (err) { 
                console.error("Error init sheets:", err); 
                await loadAllData(); 
            }
        }

        async function loadAllData() {
            const selectedSheet = document.getElementById('month-selector').value;
            if (!selectedSheet) return;

            document.getElementById('login-section').style.display = 'none';
            document.getElementById('dashboard-container').style.display = 'block';
            
            try {
                const resp = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}/values/'${selectedSheet}'!A1:K150`, { 
                    headers: { 'Authorization': `Bearer ${accessToken}` } 
                });
                const result = await resp.json();
                fullDataRows = result.values || [];
                
                updateDeptFilter(fullDataRows);
                renderDashboard();
            } catch (err) { console.error("Error loading sheet data:", err); }
        }

        // Автоматически наполняем фильтр департаментов на основе данных в колонке A
        function updateDeptFilter(rows) {
            const deptSelector = document.getElementById('dept-selector');
            const currentSelection = deptSelector.value;
            deptSelector.innerHTML = '<option value="ALL">ALL DEPARTMENTS</option>';
            
            if (rows.length < 2) return;
            
            const depts = [...new Set(rows.slice(1).map(r => r[0] ? r[0].trim().toUpperCase() : null))].filter(d => d);
            
            depts.sort().forEach(dept => {
                const option = document.createElement('option');
                option.value = dept;
                option.text = dept;
                if (dept === currentSelection) option.selected = true;
                deptSelector.appendChild(option);
            });
        }

        function renderDashboard() {
            const container = document.getElementById('kpi-content-area');
            const selectedDept = document.getElementById('dept-selector').value;
            container.innerHTML = '';
            
            if (!fullDataRows || fullDataRows.length === 0) return;

            const headers = {
                y1: fullDataRows[0][2] || "Year 1",
                y2: fullDataRows[0][4] || "Year 2",
                prev: fullDataRows[0][6] || "Prev Month",
                old: fullDataRows[0][8] || "5 Years Ago",
                target: fullDataRows[0][10] || "Target"
            };

            const dataMap = new Map();

            fullDataRows.slice(1).forEach(row => {
                const mainDeptRaw = row[0] ? row[0].trim().toUpperCase() : null;
                const categoryFull = row[1] ? row[1].trim() : null;
                if (!mainDeptRaw || !categoryFull) return;

                // Применяем фильтр по основному департаменту
                if (selectedDept !== "ALL" && mainDeptRaw !== selectedDept) return;

                const subDeptRaw = categoryFull.includes(' - ') 
                    ? categoryFull.split(' - ')[0].trim().toUpperCase() 
                    : 'GENERAL';

                if (!dataMap.has(mainDeptRaw)) dataMap.set(mainDeptRaw, new Map());
                const subMap = dataMap.get(mainDeptRaw);
                if (!subMap.has(subDeptRaw)) subMap.set(subDeptRaw, []);
                subMap.get(subDeptRaw).push(row);
            });

            if (dataMap.size === 0) {
                container.innerHTML = '<div class="text-center py-20 text-slate-500">No data found for the selected filter.</div>';
                return;
            }

            dataMap.forEach((subMap, mainDeptName) => {
                let deptSection = document.createElement('div');
                deptSection.className = 'main-dept-group space-y-8 pt-10';
                deptSection.innerHTML = `
                    <div class="mb-8 ml-2">
                        <h2 class="text-4xl font-black uppercase italic text-indigo-400 border-l-8 border-indigo-600 pl-6 tracking-tighter">
                            ${mainDeptName}
                        </h2>
                    </div>
                `;

                subMap.forEach((rows, subDeptName) => {
                    let cardHtml = `
                        <div class="kpi-card mb-10">
                            <div class="side-label">${subDeptName}</div>
                            <div class="flex-1 p-8">
                                <div class="grid-row border-none text-[10px] uppercase font-bold text-slate-500 text-center mb-2">
                                    <div></div>
                                    <div>${headers.y1}</div>
                                    <div>${headers.y2}</div>
                                    <div>${headers.prev}</div>
                                    <div>${headers.old}</div>
                                    <div class="text-indigo-200">${headers.target}</div>
                                </div>
                                ${rows.map(row => renderKpiRow(row)).join('')}
                            </div>
                        </div>
                    `;
                    deptSection.innerHTML += cardHtml;
                });
                container.appendChild(deptSection);
            });
        }

        function renderKpiRow(row) {
            const icons = { "Income": "💰", "Expenses": "💳", "Profit": "📈", "Participants": "👥" };
            const categoryFull = row[1] || "";
            const category = categoryFull.includes(' - ') ? categoryFull.split(' - ')[1].trim() : categoryFull.trim();
            
            let icon = "•";
            for (let key in icons) {
                if (category.toLowerCase().includes(key.toLowerCase())) { icon = icons[key]; break; }
            }

            return `
                <div class="grid-row">
                    <div class="font-bold flex items-center gap-2 text-slate-300 text-sm">
                        <span class="text-lg">${icon}</span> ${category}
                    </div>
                    ${createValBox(row[2], row[3], category)} 
                    ${createValBox(row[4], row[5], category)} 
                    ${createValBox(row[6], row[7], category)} 
                    ${createValBox(row[8], row[9], category)} 
                    <div class="target-box">${row[10] || '-'}</div> 
                </div>
            `;
        }

        function createValBox(val, trend, category) {
            if (!val || val.trim() === "") return `<div class="text-center text-slate-600">—</div>`;
            const isExpenses = category.toLowerCase().includes('expenses');
            let arrow = '', colorClass = 'stable';

            if (trend === 'UP') {
                arrow = '▲';
                colorClass = isExpenses ? 'arrow-down' : 'arrow-up';
            } else if (trend === 'DOWN') {
                arrow = '▼';
                colorClass = isExpenses ? 'arrow-up' : 'arrow-down';
            } else {
                arrow = '=';
            }
            return `<div class="val-box"><span>${val}</span><span class="${colorClass} font-black">${arrow}</span></div>`;
        }
    </script>
</head>
<body>

<header class="flex items-center justify-between px-8 py-4 bg-[#0f172a] border-b border-slate-700 shadow-lg no-print">
    <div class="flex items-center gap-3">
        <img src="NoAca_logo_Symbolwhite.png" alt="Logo" class="h-16 w-auto object-contain">
        <div class="flex flex-col border-l border-slate-700 pl-4 ml-2">
            <span class="text-xl font-bold text-white tracking-tight">Gueslectors</span>
            <span class="text-[10px] uppercase text-slate-500 font-bold tracking-[0.2em]">KPI Monthly Report</span>
        </div>
    </div>

    <div class="flex items-center gap-4">
        <div class="flex items-center gap-2">
            <span class="text-[10px] font-black text-slate-500 uppercase">Period:</span>
            <select id="month-selector" onchange="loadAllData()"></select>
        </div>
        
        <div class="flex items-center gap-2">
            <span class="text-[10px] font-black text-slate-500 uppercase">Dept:</span>
            <select id="dept-selector" onchange="renderDashboard()">
                <option value="ALL">ALL DEPARTMENTS</option>
            </select>
        </div>

        <button onclick="window.print()" class="bg-indigo-600 hover:bg-indigo-500 text-white text-xs font-bold py-2.5 px-5 rounded-xl flex items-center gap-2 transition-all shadow-lg shadow-indigo-500/20 ml-2">
            Export PDF
        </button>
    </div>
</header>

<main>
    <div id="login-section" class="flex flex-col items-center justify-center h-[80vh] no-print">
        <button onclick="handleAuthClick()" class="bg-white hover:bg-slate-100 text-slate-900 font-bold py-4 px-10 rounded-2xl shadow-2xl active:scale-95 flex items-center gap-4 text-lg transition-all">
            <img src="https://www.google.com/favicon.ico" width="24"> Sign in with Google
        </button>
    </div>

    <div id="dashboard-container">
        <div id="kpi-content-area" class="space-y-6 pb-20"></div>
    </div>
</main>

<script src="https://accounts.google.com/gsi/client" onload="initClient()" async defer></script>
</body>
</html>
