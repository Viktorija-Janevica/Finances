<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KPI Report | Dynamic</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f1f5f9; margin: 0; }
        #dashboard-container { display: none; padding: 24px; max-width: 1400px; margin: 0 auto; }
        
        /* Стили для печати */
        @media print {
            body { background: white !important; color: black !important; }
            header, .no-print { display: none !important; }
            .kpi-card { break-inside: avoid; border: 1px solid #ccc !important; background: white !important; color: black !important; box-shadow: none !important; }
            .side-label { background: #333 !important; }
            .val-box { border: 1px solid #333 !important; background: white !important; color: black !important; }
            .target-box { background: #eee !important; border: 1px solid #333 !important; color: black !important; }
            #dashboard-container { display: block !important; padding: 0; }
        }

        .kpi-card { background: #1e293b; border-radius: 16px; border: 1px solid #334155; overflow: hidden; display: flex; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.2); }
        .side-label { background: #6366f1; color: white; writing-mode: vertical-lr; transform: rotate(180deg); text-align: center; font-weight: 800; padding: 15px; letter-spacing: 0.1em; text-transform: uppercase; min-width: 50px; }
        
        .grid-row { display: grid; grid-template-columns: 180px 1fr 1fr 1fr 1fr 1fr; gap: 12px; align-items: center; padding: 10px 0; border-bottom: 1px solid #334155; }
        .grid-row:last-child { border-bottom: none; }
        
        .val-box { border: 2px solid #6366f1; border-radius: 8px; padding: 8px 12px; display: flex; justify-content: space-between; align-items: center; font-weight: 700; background: #0f172a; min-height: 44px; }
        .target-box { background: #312e81; border: 2px solid #818cf8; color: #e0e7ff; text-align: center; font-weight: 800; border-radius: 8px; padding: 8px; }
        
        .arrow-up { color: #22c55e; font-size: 1.1rem; }
        .arrow-down { color: #ef4444; font-size: 1.1rem; }
        .stable { color: #94a3b8; }

        select { background: #1e293b; color: white; border: 1px solid #475569; padding: 8px 12px; border-radius: 8px; cursor: pointer; font-weight: 600; }
    </style>
</head>
<body>

<header class="flex items-center justify-between px-8 py-4 bg-[#0f172a] border-b border-slate-700 shadow-lg no-print">
    <div class="flex items-center gap-3">
        <img src="NoAca_logo_Symbolwhite.png" alt="Logo" class="h-16 w-auto object-contain">
        <div class="flex flex-col">
            <span class="text-xl font-bold text-white">Gueslectors</span>
            <span class="text-[10px] uppercase text-slate-400 tracking-widest">KPI Report System</span>
        </div>
    </div>

    <div class="flex items-center gap-6">
        <div class="flex items-center gap-3">
            <span class="text-xs font-bold text-slate-500 uppercase">Report Month:</span>
            <select id="month-selector" onchange="loadAllData()"></select>
        </div>
        <button onclick="window.print()" class="bg-slate-700 hover:bg-slate-600 text-white text-xs font-bold py-2 px-4 rounded-lg flex items-center gap-2 transition-all">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9V2h12v7"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect width="12" height="8" x="6" y="14"/></svg>
            Export PDF
        </button>
    </div>
</header>

<main>
    <div id="login-section" class="flex flex-col items-center justify-center h-[80vh]">
        <button id="login-btn" onclick="handleAuthClick()" class="bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-4 px-12 rounded-xl shadow-2xl active:scale-95 flex items-center gap-4 text-lg transition-all">
            <img src="https://www.google.com/favicon.ico" width="24"> Login with Google
        </button>
    </div>

    <div id="dashboard-container" class="fade-in">
        <div id="kpi-content-area" class="space-y-12 py-10"></div>
    </div>
</main>

<script>
    const CLIENT_ID = '962018048971-1362jqjncldrmln6rm01g88v1jj45go9.apps.googleusercontent.com';
    const SPREADSHEET_ID = '1eqKkNYd4k9CSlRw8tOCtgzxDooVZgD0z8vjupFgO8iI';
    
    let tokenClient, accessToken = null;

    function initClient() {
        tokenClient = google.accounts.oauth2.initTokenClient({
            client_id: CLIENT_ID,
            scope: 'https://www.googleapis.com/auth/spreadsheets.readonly',
            callback: async (resp) => { 
                if (resp.access_token) { 
                    accessToken = resp.access_token; 
                    await fetchSheetNames(); 
                } 
            },
        });
    }

    function handleAuthClick() { tokenClient.requestAccessToken(); }

    async function fetchSheetNames() {
        try {
            const resp = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}?fields=sheets.properties.title`, {
                headers: { 'Authorization': `Bearer ${accessToken}` }
            });
            const data = await resp.json();
            const selector = document.getElementById('month-selector');
            selector.innerHTML = '';

            data.sheets.forEach((sheet, index) => {
                const name = sheet.properties.title;
                const option = document.createElement('option');
                option.value = name;
                option.text = name;
                if (index === data.sheets.length - 1) option.selected = true;
                selector.appendChild(option);
            });

            await loadAllData();
        } catch (err) { console.error("Error fetching sheets:", err); }
    }

    async function loadAllData() {
        const selectedSheet = document.getElementById('month-selector').value;
        if (!selectedSheet) return;

        document.getElementById('login-section').style.display = 'none';
        document.getElementById('dashboard-container').style.display = 'block';
        
        try {
            const resp = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}/values/'${selectedSheet}'!A1:K100`, { 
                headers: { 'Authorization': `Bearer ${accessToken}` } 
            });
            const result = await resp.json();
            renderDashboard(result.values || []);
        } catch (err) { console.error("Error loading data:", err); }
    }

    function renderDashboard(allRows) {
        const container = document.getElementById('kpi-content-area');
        container.innerHTML = '';
        if (allRows.length === 0) return;

        // Авто-группировка по Департаментам (Колонка A)
        const departments = [...new Set(allRows.slice(1).map(r => r[0]))].filter(d => d);

        departments.forEach(dept => {
            const deptRows = allRows.filter(r => r[0] === dept);
            
            let cardHtml = `
                <div class="mb-4 ml-2">
                    <h2 class="text-3xl font-black uppercase italic text-indigo-400 border-l-4 border-indigo-600 pl-4 tracking-tighter">${dept}</h2>
                </div>
                <div class="kpi-card mb-10">
                    <div class="side-label">KPI</div>
                    <div class="flex-1 p-8">
                        <div class="grid-row border-none text-[10px] uppercase font-bold text-slate-500 text-center mb-2">
                            <div></div>
                            <div>2024 Year</div>
                            <div>2025 Year</div>
                            <div>Prev Month</div>
                            <div>5 Years Ago</div>
                            <div class="text-indigo-200">2026 Target</div>
                        </div>
                        ${deptRows.map(row => renderKpiRow(row)).join('')}
                    </div>
                </div>
            `;
            container.innerHTML += cardHtml;
        });
    }

    function renderKpiRow(row) {
        const icons = { "Income": "💰", "Expenses": "💳", "Profit": "📈", "Participants": "👥" };
        const categoryFull = row[1] || "";
        const category = categoryFull.includes(' - ') ? categoryFull.split(' - ')[1] : categoryFull;
        const icon = icons[category] || "•";

        return `
            <div class="grid-row">
                <div class="font-bold flex items-center gap-2 text-slate-300 text-sm">
                    <span class="text-lg">${icon}</span> ${category}
                </div>
                ${createValBox(row[2], row[3], category)} 
                ${createValBox(row[4], row[5], category)} 
                ${createValBox(row[6], row[7], category)} 
                ${createValBox(row[8], row[9], category)} 
                <div class="target-box">${row[10] || '-'}</div> 
            </div>
        `;
    }

    function createValBox(val, trend, category) {
        if (!val || val.trim() === "") return `<div class="text-center text-slate-600">—</div>`;
        const isExpenses = category.toLowerCase().includes('expenses');
        let arrow = '', colorClass = 'stable';

        if (trend === 'UP') {
            arrow = '▲';
            colorClass = isExpenses ? 'arrow-down' : 'arrow-up';
        } else if (trend === 'DOWN') {
            arrow = '▼';
            colorClass = isExpenses ? 'arrow-up' : 'arrow-down';
        } else {
            arrow = '=';
        }
        
        return `<div class="val-box"><span>${val}</span><span class="${colorClass} font-black">${arrow}</span></div>`;
    }
</script>
<script src="https://accounts.google.com/gsi/client" onload="initClient()" async defer></script>
</body>
</html>
